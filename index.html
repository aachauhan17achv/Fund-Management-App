            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>,

            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            ArrowRightLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 20 7 16 11"></polyline><line x1="10" y1="7" x2="20" y2="7"></line><polyline points="8 21 4 17 8 13"></polyline><line x1="4" y1="17" x2="14" y2="17"></line></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,

            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Lightbulb: () => <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>,
            ArrowDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
        };

        // ================= Helper Functions =================
        const toGujaratiDigits = (numStr) => {
            if (numStr === null || numStr === undefined) return '';
            const gujDigits = ['૦', '૧', '૨', '૩', '૪', '૫', '૬', '૭', '૮', '૯'];
            return numStr.toString().replace(/[0-9]/g, (match) => gujDigits[match]);
        };

        const formatDate = (dateString) => {
            if (!dateString) return '';
            const [year, month, day] = dateString.split('-');
            return toGujaratiDigits(`${day}-${month}-${year}`);
        };

        const formatCurrency = (amount) => {
            if (amount === 0 || !amount) return toGujaratiDigits("0.00");
            const formatted = new Intl.NumberFormat('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount);
            return toGujaratiDigits(formatted);
        };

        const formatForJournal = (name) => {
            if (!name) return '';
            return name.replace(/\s*ખાતું$/, '');
        };

        const playSuccessSound = () => {
            try {
                const audio = new Audio('Coins Sound Effect.wav');
                audio.currentTime = 0; 
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {}).catch(error => {
                        console.log("Audio play blocked by browser policies.", error);
                    });
                }
            } catch (e) {
                console.error("Audio playback failed", e);
            }
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('entry');
            const [isExporting, setIsExporting] = useState(false);
            
            const initialAccounts = [
                { name: "રોકડ ખાતું", type: "Asset", category: "Real" },
                { name: "SBI સેવીંગ્ઝ બેન્ક (SB) ખાતું", type: "Asset", category: "Real" },
                { name: "SBI ફિક્સ ડિપોઝીટ (FD) ખાતું", type: "Asset", category: "Real" },
                { name: "એકાઉન્ટીંગ ખર્ચ ખાતું", type: "Expense", category: "Nominal" },
                { name: "પરચુરણ ખર્ચ ખાતું", type: "Expense", category: "Nominal" },
                { name: "માલ-મિલકત સમારકામ ખાતું", type: "Expense", category: "Nominal" },
                { name: "સેવીંગ્ઝ બેન્ક વ્યાજ આવક ખાતું", type: "Income", category: "Nominal" },
                { name: "FD વ્યાજ આવક ખાતું", type: "Income", category: "Nominal" },
                { name: "SHIVOM FINANCIAL (લેણદાર)", type: "Liability", category: "Personal" }
            ];

            // LocalStorage માંથી ડેટા લોડ કરવા માટે State Initialize કર્યું
            const [accounts, setAccounts] = useState(() => {
                const savedAccounts = localStorage.getItem('fundAppAccounts');
                return savedAccounts ? JSON.parse(savedAccounts) : initialAccounts;
            });

            const [transactions, setTransactions] = useState(() => {
                const savedTxns = localStorage.getItem('fundAppTransactions');
                return savedTxns ? JSON.parse(savedTxns) : [];
            });

            // જ્યારે પણ accounts કે transactions માં ફેરફાર થાય, તેને LocalStorage માં સેવ કરો
            useEffect(() => {
                localStorage.setItem('fundAppAccounts', JSON.stringify(accounts));
            }, [accounts]);

            useEffect(() => {
                localStorage.setItem('fundAppTransactions', JSON.stringify(transactions));
            }, [transactions]);


            const [entryMode, setEntryMode] = useState('payment_to_person'); 
            const [editingTxnId, setEditingTxnId] = useState(null);

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                debitAccount: '',
                creditAccount: '',
                amount: '',
                checkNo: '',
                narration: ''
            });

            const [newAccountName, setNewAccountName] = useState('');
            const [newAccountType, setNewAccountType] = useState('Expense');

            const [accountToEdit, setAccountToEdit] = useState('');
            const [newNameForEdit, setNewNameForEdit] = useState('');

            const handleModeChange = (mode) => {
                setEntryMode(mode);
                if (!editingTxnId) {
                    setFormData({
                        date: new Date().toISOString().split('T')[0],
                        debitAccount: '',
                        creditAccount: '',
                        amount: '',
                        checkNo: '',
                        narration: ''
                    });
                }
            };

            const handleAddAccount = () => {
                if (newAccountName.trim() !== '' && !accounts.find(a => a.name === newAccountName.trim())) {
                let category = 'Real';
                if (newAccountType === 'Expense' || newAccountType === 'Income') category = 'Nominal';
                else if (newAccountType === 'Personal_Debtor' || newAccountType === 'Personal_Creditor') category = 'Personal';
                
                const type = (newAccountType === 'Personal_Debtor' || newAccountType === 'Asset') ? 'Asset' : 
                            (newAccountType === 'Personal_Creditor') ? 'Liability' : newAccountType;

                setAccounts([...accounts, { name: newAccountName.trim(), type: type, category: category }]);
                setNewAccountName('');
                }
            };

            const handleUpdateAccount = () => {
                const trimmedNewName = newNameForEdit.trim();
                if (!trimmedNewName) {
                    alert("કૃપા કરીને નવું નામ લખો.");
                    return;
                }
                if (trimmedNewName === accountToEdit) {
                    alert("નવું નામ અને જૂનું નામ સરખું જ છે.");
                    return;
                }
                if (accounts.find(a => a.name === trimmedNewName)) {
                    alert("આ નામનું ખાતું પહેલેથી જ અસ્તિત્વમાં છે.");
                    return;
                }

                setAccounts(prevAccounts => prevAccounts.map(acc =>
                    acc.name === accountToEdit ? { ...acc, name: trimmedNewName } : acc
                ));

                setTransactions(prevTxns => prevTxns.map(txn => {
                    let updatedTxn = { ...txn };
                    if (txn.debitAccount === accountToEdit) updatedTxn.debitAccount = trimmedNewName;
                    if (txn.creditAccount === accountToEdit) updatedTxn.creditAccount = trimmedNewName;
                    
                    const oldNameForNarration = formatForJournal(accountToEdit);
                    const newNameForNarration = formatForJournal(trimmedNewName);
                    updatedTxn.narration = updatedTxn.narration.split(oldNameForNarration).join(newNameForNarration);
                    
                    return updatedTxn;
                }));

                alert("ખાતાનું નામ સફળતાપૂર્વક અપડેટ થઈ ગયું છે!");
                setAccountToEdit('');
                setNewNameForEdit('');
            };

            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!formData.date || !formData.debitAccount || !formData.creditAccount || !formData.amount) {
                alert("કૃપા કરીને બધી જરૂરી માહિતી ભરો."); return;
                }
                if (formData.debitAccount === formData.creditAccount) {
                alert("ઉધાર અને જમા ખાતું અલગ હોવું જોઈએ."); return;
                }

                let finalNarration = formData.narration;
                if (!finalNarration) {
                const checkStr = formData.checkNo ? `ચેક નં. ${toGujaratiDigits(formData.checkNo)}` : '';
                if(entryMode === 'expense_payment') finalNarration = `(બા.જે. ખર્ચ પેટે ${formatForJournal(formData.creditAccount)} દ્વારા ચૂકવ્યા. ${checkStr})`;
                else if(entryMode === 'income_receipt') finalNarration = `(બા.જે. આવક પેટે રકમ ${formatForJournal(formData.debitAccount)} માં જમા થઈ.)`;
                else if(entryMode === 'payment_to_person') finalNarration = `(બા.જે. ${formatForJournal(formData.debitAccount)} ને ચૂકવ્યા. ${checkStr})`;
                else if(entryMode === 'receipt_from_person') finalNarration = `(બા.જે. ${formatForJournal(formData.creditAccount)} પાસેથી રકમ મળી.)`;
                else if(entryMode === 'contra') finalNarration = `(બા.જે. ${formatForJournal(formData.creditAccount)} માંથી ${formatForJournal(formData.debitAccount)} માં ફંડ ટ્રાન્સફર / રોકાણ કર્યું.)`;
                else finalNarration = `(બા.જે. વ્યવહાર નોંધ્યો.)`;
                }

                const newTxn = {
                id: editingTxnId ? editingTxnId : Date.now(),
                date: formData.date,
                debitAccount: formData.debitAccount,
                creditAccount: formData.creditAccount,
                amount: parseFloat(formData.amount),
                checkNo: formData.checkNo,
                narration: finalNarration
                };

                if (editingTxnId) {
                    setTransactions(transactions.map(t => t.id === editingTxnId ? newTxn : t));
                    setEditingTxnId(null);
                    alert("વ્યવહાર સફળતાપૂર્વક સુધારાઈ ગયો છે!");
                } else {
                    setTransactions([...transactions, newTxn]);
                    playSuccessSound();
                }
                
                setFormData({ date: new Date().toISOString().split('T')[0], amount: '', narration: '', checkNo: '', debitAccount: '', creditAccount: '' });
            };

            const deleteTransaction = (id) => {
                if (window.confirm("શું તમે ખરેખર આ વ્યવહાર રદ કરવા માંગો છો?")) {
                    setTransactions(transactions.filter(t => t.id !== id));
                }
            };

            const handleEditTransaction = (txn) => {
                setEntryMode('manual'); 
                setEditingTxnId(txn.id);
                setFormData({
                    date: txn.date,
                    debitAccount: txn.debitAccount,
                    creditAccount: txn.creditAccount,
                    amount: txn.amount.toString(),
                    checkNo: txn.checkNo || '',
                    narration: txn.narration || ''
                });
                setActiveTab('entry');
            };

            const financialData = useMemo(() => {
                const ledgers = {};
                let totalSavings = 0, totalFD = 0, totalIncome = 0;

                accounts.forEach(acc => { ledgers[acc.name] = { type: acc.type, debits: [], credits: [], totalDebit: 0, totalCredit: 0, closingBalance: 0, balanceType: '' }; });

                transactions.forEach(txn => {
                if (!ledgers[txn.debitAccount]) ledgers[txn.debitAccount] = { debits: [], credits: [], totalDebit: 0, totalCredit: 0 };
                ledgers[txn.debitAccount].debits.push({ date: txn.date, particular: `તે ${formatForJournal(txn.creditAccount)} ખાતે`, amount: txn.amount, id: txn.id });
                ledgers[txn.debitAccount].totalDebit += txn.amount;

                if (!ledgers[txn.creditAccount]) ledgers[txn.creditAccount] = { debits: [], credits: [], totalDebit: 0, totalCredit: 0 };
                ledgers[txn.creditAccount].credits.push({ date: txn.date, particular: `${formatForJournal(txn.debitAccount)} ખાતે ઉ.`, amount: txn.amount, id: txn.id });
                ledgers[txn.creditAccount].totalCredit += txn.amount;
                });

                Object.keys(ledgers).forEach(key => {
                const dr = ledgers[key].totalDebit, cr = ledgers[key].totalCredit;
                if (dr > cr) { ledgers[key].closingBalance = dr - cr; ledgers[key].balanceType = 'Dr'; } 
                else if (cr > dr) { ledgers[key].closingBalance = cr - dr; ledgers[key].balanceType = 'Cr'; } 
                else { ledgers[key].closingBalance = 0; ledgers[key].balanceType = '-'; }

                if (key.includes("સેવીંગ્ઝ") || key.includes("રોકડ")) totalSavings += (ledgers[key].balanceType === 'Dr' ? ledgers[key].closingBalance : -ledgers[key].closingBalance);
                if (key.includes("FD") && ledgers[key].type === "Asset") totalFD += (ledgers[key].balanceType === 'Dr' ? ledgers[key].closingBalance : -ledgers[key].closingBalance);
                if (key.includes("Income") || key.includes("આવક")) totalIncome += ledgers[key].closingBalance;

                return { ledgers, totalSavings, totalFD, totalIncome };

                try {
                const wb = XLSX.utils.book_new();

                const journalData = [];

                journalData.push(["તારીખ", "વિગત", "ખા.પા.", "ઉધાર (₹)", "જમા (₹)"]);

                transactions.forEach(txn => {
                    const drName = formatForJournal(txn.debitAccount);
                    const crName = formatForJournal(txn.creditAccount);
                    const formattedDateForExcel = txn.date.split('-').reverse().join('-'); 
                    
                    journalData.push([formattedDateForExcel, `${drName} ખાતે ઉ.`, "", txn.amount, ""]);
                    journalData.push(["", `તે ${crName} ખાતે`, "", "", txn.amount]);
                    journalData.push(["", txn.narration, "", "", ""]);
                });

                const wsJournal = XLSX.utils.aoa_to_sheet(journalData);
                wsJournal['!cols'] = [{ wch: 12 }, { wch: 50 }, { wch: 8 }, { wch: 12 }, { wch: 12 }];
                XLSX.utils.book_append_sheet(wb, wsJournal, "આમ નોંધ");

                const ledgerData = [];
                Object.entries(financialData.ledgers).forEach(([accName, data]) => {
                    if (data.debits.length === 0 && data.credits.length === 0) return;
                    ledgerData.push([accName, "", "", "", "", ""]);
                    ledgerData.push(["તારીખ", "વિગત (જમા)", "જમા રૂપિયા", "ઉધાર તારીખ", "વિગત (ઉધાર)", "ઉધાર રૂપિયા"]);

                    const maxRows = Math.max(data.credits.length, data.debits.length);
                    let totalCr = 0, totalDr = 0;

                    for (let i = 0; i < maxRows; i++) {
                    const cr = data.credits[i], dr = data.debits[i];
                    if(cr) totalCr += cr.amount;
                    if(dr) totalDr += dr.amount;
                    
                    const crDate = cr ? cr.date.split('-').reverse().join('-') : "";
                    const drDate = dr ? dr.date.split('-').reverse().join('-') : "";

                    ledgerData.push([crDate, cr ? cr.particular : "", cr ? cr.amount : "", drDate, dr ? dr.particular : "", dr ? dr.amount : ""]);
                    }
                    ledgerData.push(["", "કુલ જમા", totalCr, "", "કુલ ઉધાર", totalDr]);
                    
                    let closingTextDr = "", closingAmtDr = "", closingTextCr = "", closingAmtCr = "";

                    ledgerData.push(["", closingTextCr, closingAmtCr, "", closingTextDr, closingAmtCr]);
                    ledgerData.push(["", "", "", "", "", ""]); ledgerData.push(["", "", "", "", "", ""]);
                });

                const wsLedger = XLSX.utils.aoa_to_sheet(ledgerData);

                        <h2 className="text-xl font-extrabold text-[#1e3a8a] border-b-2 border-amber-100 pb-4 mb-6 mt-10">ખાતાનું નામ સુધારો</h2>
                        <div className="space-y-4 mb-2">
                            <select className="w-full border-2 border-slate-200 rounded-xl p-3 text-sm font-bold text-slate-700 bg-slate-50 outline-none focus:border-amber-400 focus:bg-amber-50/30 transition-colors" value={accountToEdit} onChange={e => { setAccountToEdit(e.target.value); setNewNameForEdit(e.target.value); }}>
                                <option value="">-- ખાતું પસંદ કરો --</option>
                                {accounts.map(acc => <option key={acc.name} value={acc.name}>{acc.name}</option>)}
                            </select>
                            {accountToEdit && (
                                <div className="space-y-4 mt-2">
                                    <input type="text" placeholder="નવું નામ..." className="w-full border-2 border-slate-200 rounded-xl p-3 text-sm font-bold text-slate-700 outline-none focus:border-amber-400 focus:bg-amber-50/30 transition-colors" value={newNameForEdit} onChange={e => setNewNameForEdit(e.target.value)} />
                                    <button onClick={handleUpdateAccount} className="w-full bg-blue-600 hover:bg-blue-700 text-amber-50 p-3.5 rounded-xl text-sm font-black tracking-wider uppercase transition-all duration-200 shadow-md border border-transparent hover:border-blue-400 active:scale-95">અપડેટ કરો</button>
                                </div>
                            )}
                        </div>
                        </div>
                    </div>
                    )}

                    {activeTab === 'journal' && (
                    <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div className="p-6 md:p-8 border-b-2 border-amber-100 bg-gradient-to-r from-slate-50 to-white flex flex-col md:flex-row justify-between items-center gap-4">
                        <h2 className="text-2xl font-black text-[#1e3a8a] tracking-tight">આમનોંધ પત્રક (Journal)</h2>
                        <span className="text-sm bg-[#1e3a8a] text-amber-400 border border-amber-400/30 px-5 py-2 rounded-full font-bold shadow-md">
                            કુલ નોંધ: <span className="text-white ml-1">{toGujaratiDigits(transactions.length)}</span>
                        </span>
                        </div>
                        <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                            <tr className="bg-slate-50 border-y-2 border-slate-200">
                                <th className="p-5 w-32 font-black text-sm lg:text-base uppercase tracking-widest text-slate-600 text-center border-r border-slate-200/50">તારીખ</th>
                                <th className="p-5 font-black text-sm lg:text-base uppercase tracking-widest text-slate-600 border-r border-slate-200/50">વિગત</th>
                                <th className="p-5 w-24 font-black text-sm lg:text-base uppercase tracking-widest text-slate-600 text-center border-r border-slate-200/50">ખા.પા.</th>
                                <th className="p-5 w-40 font-black text-sm lg:text-base uppercase tracking-widest text-slate-600 text-right border-r border-slate-200/50">ઉધાર (₹)</th>
                                <th className="p-5 w-40 font-black text-sm lg:text-base uppercase tracking-widest text-slate-600 text-right">જમા (₹)</th>
                                <th className="p-5 w-28 text-center">એક્શન</th>
                            </tr>
                            </thead>
                            <tbody className="text-slate-700 bg-white">
                            {transactions.map((txn, index) => (
                                <React.Fragment key={txn.id}>
                                <tr className="group hover:bg-amber-50/30 transition-colors">
                                    <td className="p-5 align-top font-bold text-base text-slate-500 text-center border-t border-r border-slate-100" rowSpan={3}>{formatDate(txn.date)}</td>
                                    <td className="p-3 px-5 font-black text-[#1e3a8a] text-lg border-t border-r border-slate-100">{formatForJournal(txn.debitAccount)} ખાતે ઉધાર</td>
                                    <td className="p-3 px-5 text-center text-slate-300 border-t border-r border-slate-100">-</td>
                                    <td className="p-3 px-5 text-right font-black text-xl text-[#1e3a8a] border-t border-r border-slate-100">{formatCurrency(txn.amount)}</td>
                                    <td className="p-3 px-5 text-right border-t border-slate-100"></td>
                                    <td className="p-4 text-center align-top border-t border-slate-100 space-y-2" rowSpan={3}>
                                        <button onClick={() => handleEditTransaction(txn)} className="flex items-center justify-center gap-1.5 w-full text-blue-600 hover:text-white hover:bg-blue-500 p-2 rounded-xl transition-all font-bold text-xs opacity-0 group-hover:opacity-100 shadow-sm border border-transparent hover:border-blue-600">
                                            <Icons.Edit /> સુધારો
                                        </button>
                                        <button onClick={() => deleteTransaction(txn.id)} className="flex items-center justify-center gap-1.5 w-full text-rose-500 hover:text-white hover:bg-rose-500 p-2 rounded-xl transition-all font-bold text-xs opacity-0 group-hover:opacity-100 shadow-sm border border-transparent hover:border-rose-600">
                                            <Icons.Trash2 /> રદ કરો
                                        </button>
                                    </td>
                                </tr>
                                <tr className="group-hover:bg-amber-50/30 transition-colors">
                                    <td className="p-3 px-5 pl-14 font-bold text-slate-600 text-lg border-r border-slate-100">તે {formatForJournal(txn.creditAccount)} ખાતે</td>
                                    <td className="p-3 px-5 text-center text-slate-300 border-r border-slate-100">-</td>
                                    <td className="p-3 px-5 text-right border-r border-slate-100"></td>
                                    <td className="p-3 px-5 text-right font-black text-xl text-slate-700">{formatCurrency(txn.amount)}</td>
                                </tr>
                                <tr className="border-b-[6px] border-slate-50 group-hover:bg-amber-50/30 transition-colors">
                                    <td className="p-4 px-5 italic text-[15px] text-slate-500 font-medium bg-slate-50/50 border-r border-slate-100" colSpan={4}>
                                    {txn.narration}
                                    </td>
                                </tr>
                                </React.Fragment>
                            ))}
                            {transactions.length === 0 && (
                                <tr><td colSpan={6} className="p-16 text-center text-slate-400 font-bold text-xl">કોઈ વ્યવહાર નોંધાયેલ નથી.</td></tr>
                            )}
                            </tbody>
                        </table>
                        </div>
                    </div>
                    )}

                    {activeTab === 'ledger' && (
                    <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                        {Object.entries(financialData.ledgers).map(([accName, data]) => {
                            if (data.debits.length === 0 && data.credits.length === 0) return null;
                            return (
                            <div key={accName} className="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100">
                                <div className="bg-gradient-to-r from-[#0f172a] to-[#1e3a8a] p-5 text-center text-amber-400 relative border-b-[3px] border-amber-400">
                                <h3 className="text-2xl font-black tracking-wide drop-shadow-md">{accName}</h3>
                                </div>
                                
                                <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[800px]">
                                    <thead>
                                    <tr className="bg-slate-50 text-slate-700 text-[15px] font-black border-b-2 border-slate-200">
                                        <th className="p-4 text-center border-r border-slate-200 w-32 uppercase tracking-widest">તારીખ</th>
                                        <th className="p-4 border-r border-slate-200 uppercase tracking-widest">વિગત (જમા)</th>
                                        <th className="p-4 text-right border-r-4 border-slate-300 w-36 uppercase tracking-widest">જમા (₹)</th>
                                        <th className="p-4 text-center border-r border-slate-200 w-32 uppercase tracking-widest">તારીખ</th>
                                        <th className="p-4 border-r border-slate-200 uppercase tracking-widest">વિગત (ઉધાર)</th>
                                        <th className="p-4 text-right w-36 uppercase tracking-widest">ઉધાર (₹)</th>
                                    </tr>
                                    </thead>
                                    <tbody className="bg-white text-[15px] font-bold text-slate-600">
                                    {Array.from({ length: Math.max(data.credits.length, data.debits.length) }).map((_, i) => {
                                        const cr = data.credits[i];
                                        const dr = data.debits[i];
                                        return (
                                        <tr key={i} className="border-b border-slate-100 hover:bg-amber-50/40">
                                            <td className="p-3 text-center border-r border-slate-100 text-slate-500">{cr ? formatDate(cr.date) : ""}</td>
                                            <td className="p-3 border-r border-slate-100 text-[#1e3a8a]">{cr ? cr.particular : ""}</td>
                                            <td className="p-3 text-right font-black text-rose-600 border-r-4 border-slate-200">{cr ? formatCurrency(cr.amount) : ""}</td>
                                            
                                            <td className="p-3 text-center border-r border-slate-100 text-slate-500">{dr ? formatDate(dr.date) : ""}</td>
                                            <td className="p-3 border-r border-slate-100 text-[#1e3a8a]">{dr ? dr.particular : ""}</td>
                                            <td className="p-3 text-right font-black text-indigo-600">{dr ? formatCurrency(dr.amount) : ""}</td>
                                        </tr>
                                        );
                                    })}
                                    </tbody>
                                    <tfoot className="bg-slate-50">
                                    <tr className="border-t-2 border-slate-200">
                                        <td colSpan={2} className="p-4 text-right font-black text-slate-800 border-r border-slate-200">કુલ જમા:</td>
                                        <td className="p-4 text-right font-black text-xl text-rose-700 border-r-4 border-slate-200">{formatCurrency(data.totalCredit)}</td>
                                        <td colSpan={2} className="p-4 text-right font-black text-slate-800 border-r border-slate-200">કુલ ઉધાર:</td>
                                        <td className="p-4 text-right font-black text-xl text-indigo-700">{formatCurrency(data.totalDebit)}</td>
                                    </tr>
                                    {data.closingBalance > 0 && (
                                        <tr className="bg-amber-50/50 border-t border-slate-200">
                                        <td colSpan={3} className="p-4 text-right font-black text-[#1e3a8a] border-r-4 border-slate-200">
                                            {data.balanceType === 'Dr' ? 'બાકી આગળ લઈ ગયા (ઉધાર બાકી)' : ''}
                                            {data.balanceType === 'Dr' && <span className="ml-4 text-xl text-indigo-700">{formatCurrency(data.closingBalance)}</span>}
                                        </td>
                                        <td colSpan={3} className="p-4 text-right font-black text-[#1e3a8a]">
                                            {data.balanceType === 'Cr' ? 'બાકી આગળ લઈ ગયા (જમા બાકી)' : ''}
                                            {data.balanceType === 'Cr' && <span className="ml-4 text-xl text-rose-700">{formatCurrency(data.closingBalance)}</span>}
                                        </td>
                                        </tr>
                                    )}
                                    </tfoot>
                                </table>
                                </div>
                            </div>
                            );
                        })}
                        {Object.keys(financialData.ledgers).every(key => financialData.ledgers[key].debits.length === 0 && financialData.ledgers[key].credits.length === 0) && (
                            <div className="bg-white p-16 text-center rounded-3xl border border-slate-200 shadow-sm text-slate-400 font-bold text-xl">
                            ખાતાવહી ખાલી છે. વ્યવહારો નોંધો.
                            </div>
                        )}
                    </div>
                    )}

                    {activeTab === 'trialbalance' && (
                    <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100 max-w-5xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div className="bg-gradient-to-r from-[#0f172a] to-[#1e3a8a] p-8 text-center text-amber-400 relative overflow-hidden border-b-4 border-amber-400">
                            <h2 className="text-3xl font-black tracking-tight mb-2 drop-shadow-md">કાચું સરવૈયું (Trial Balance)</h2>
                            <p className="text-amber-100/80 font-bold tracking-widest uppercase text-xs">Financial Year Summary</p>
                        </div>
                        <table className="w-full text-left border-collapse">
                        <thead>
                            <tr className="bg-slate-50 text-slate-600 text-sm font-black uppercase tracking-widest border-b-2 border-slate-200">
                            <th className="p-5 px-8">ખાતાનું નામ</th>
                            <th className="p-5 px-8 text-right w-48 border-l border-slate-200">ઉધાર બાકી (Dr.)</th>
                            <th className="p-5 px-8 text-right w-48 border-l border-slate-200">જમા બાકી (Cr.)</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 bg-white">
                            {Object.entries(financialData.ledgers).map(([name, data]) => {
                            if (data.closingBalance === 0) return null;
                            return (
                                <tr key={name} className="hover:bg-amber-50/50 transition-colors">
                                <td className="p-4 px-8 font-black text-slate-700 text-[17px]">{name}</td>
                                <td className="p-4 px-8 text-right text-indigo-600 font-black text-xl border-l border-slate-100/50">{data.balanceType === 'Dr' ? formatCurrency(data.closingBalance) : '-'}</td>
                                <td className="p-4 px-8 text-right text-rose-600 font-black text-xl border-l border-slate-100/50">{data.balanceType === 'Cr' ? formatCurrency(data.closingBalance) : '-'}</td>
                                </tr>
                            );
                            })}
                        </tbody>
                        <tfoot className="bg-slate-50">
                            {(() => {
                                let tDr = 0, tCr = 0;
                                Object.values(financialData.ledgers).forEach(d => { if(d.balanceType==='Dr') tDr+=d.closingBalance; if(d.balanceType==='Cr') tCr+=d.closingBalance; });
                                const match = Math.abs(tDr - tCr) < 0.01;
                                return (
                                <tr>
                                    <td className="p-6 px-8 text-right font-black text-[#1e3a8a] uppercase tracking-wider text-base">કુલ સરવાળો :</td>
                                    <td className={`p-6 px-8 text-right font-black text-2xl border-t-4 border-l ${match ? 'border-t-emerald-500 text-emerald-600' : 'border-t-rose-500 text-rose-600'} border-l-slate-200`}>{formatCurrency(tDr)}</td>
                                    <td className={`p-6 px-8 text-right font-black text-2xl border-t-4 border-l ${match ? 'border-t-emerald-500 text-emerald-600' : 'border-t-rose-500 text-rose-600'} border-l-slate-200`}>{formatCurrency(tCr)}</td>
                                </tr>
                                )
                            })()}
                        </tfoot>
                        </table>
                    </div>
                    )}

                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
